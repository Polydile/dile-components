{% if hasMarkdown %}
  <div class="MarkdownLink">
      {% if tags %}
        <span class="MarkdownLink-tags">
          {% for tag in tags %}
            <span class="MarkdownLink-tag">{{ tag }}</span>
          {% endfor %}
        </span>
      {% endif %}
      <div class="MarkdownLink-actions">
        <dile-copy-text copy="{{ site.url }}/md/{{ markdownFolder }}/{{ page.fileSlug }}.md">
          <dile-button>Copy markdown URL</dile-button>
        </dile-copy-text>
      </div>
  </div>
{% endif %}
