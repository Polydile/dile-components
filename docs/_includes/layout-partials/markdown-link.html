{% if hasMarkdown %}
  <div class="MarkdownLink">
      {% if tags %}
        <span class="MarkdownLink-tags">
          {% for tag in tags %}
            <span class="MarkdownLink-tag">{{ tag }}</span>
          {% endfor %}
        </span>
      {% endif %}
      <div class="MarkdownLink-actions">
        <dile-copy-text content="{{ site.url }}/md/{{ markdownFolder }}/{{ page.fileSlug }}.md">
          <dile-button>
              <span>
                <dile-lucide-icon-copy></dile-lucide-icon-copy>
                Doc URL
              </span>
          </dile-button>
        </dile-copy-text>
        <dile-copy-markdown-url url="/md/{{ markdownFolder }}/{{ page.fileSlug }}.md">
          <dile-button>
              <span>
                <dile-lucide-icon-copy></dile-lucide-icon-copy>
                Content
              </span>
          </dile-button>
        </dile-copy-markdown-url>
      </div>
  </div>
{% endif %}
