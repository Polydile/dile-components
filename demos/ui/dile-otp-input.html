<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dile-otp-input component demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script type="module">
    import "@dile/ui/components/otp-input/otp-input.js";
  </script>
  <style>
    .styled {
      --dile-otp-input-label-color: #6d3d6c;
      --dile-otp-input-label-font-weight: bold;
      --dile-otp-input-border-radius: 0;
      --dile-otp-input-border-color: #6d3d6c;
      --dile-otp-input-border-width: 2px;
      --dile-otp-input-box-size: 3em;
      --dile-otp-input-gap: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>dile-otp-input component</h1>

    <h2>Regular OTP input</h2>
    <p>
      <dile-otp-input name="code" label="Enter your authentication code"></dile-otp-input>
    </p>

    <h2>Completed event</h2>
    <p>
      <dile-otp-input id="autosubmit" name="code" label="Auto-submits when complete"></dile-otp-input>
      <span id="autosubmit-result"></span>
    </p>
    <script>
      document.getElementById('autosubmit').addEventListener('dile-otp-input-completed', (e) => {
        document.getElementById('autosubmit-result').textContent = 'Completed with value: ' + e.detail.value;
      });
    </script>

    <h2>Focus on start</h2>
    <p>
      <dile-otp-input name="code" label="Focus!" focusOnStart></dile-otp-input>
    </p>

    <h2>Read only</h2>
    <p>
      <dile-otp-input name="code" readonly value="123456" label="Read Only"></dile-otp-input>
    </p>

    <h2>Disabled</h2>
    <p>
      <dile-otp-input name="code" disabled value="123" label="Disabled"></dile-otp-input>
    </p>

    <h2>Errored with message</h2>
    <p>
      <dile-otp-input errored name="code" label="Enter your code" message="Invalid code, try again"></dile-otp-input>
    </p>

    <h2>Custom length</h2>
    <p>
      <dile-otp-input name="code" label="4 digit code" length="4"></dile-otp-input>
    </p>

    <h2>Inside a form</h2>
    <form id="verifyForm">
      <p>
        <dile-otp-input name="code" label="Enter your code"></dile-otp-input>
      </p>
      <button type="submit">Verify</button>
    </form>
    <script>
      document.getElementById('verifyForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const data = new FormData(e.target);
        alert('Submitted code: ' + data.get('code'));
      });
    </script>

    <h2>Styled</h2>
    <p>
      <dile-otp-input class="styled" name="code" label="Styled"></dile-otp-input>
    </p>

    <footer><a href="../index.html">Back</a></footer>
  </div>
</body>
</html>
