<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dile-toast component demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script type="module">
    import "@dile/ui/components/toast/toast-persistent.js";
  </script>
  <style>
    dile-toast-persistent {
      --dile-toast-persistent-padding: 10px;
    }
    #eltoastright {
      --dile-toast-persistent-background-color: #303030;
      --dile-toast-persistent-color: red;
      --dile-toast-persistent-box-shadow: 4px 4px 10px rgba(182, 12, 12, 0.4), -4px -4px 10px rgba(182, 12, 12, 0.4), -4px 4px 10px rgba(182, 12, 12, 0.4), 4px -4px 10px rgba(182, 12, 12, 0.4);
      --dile-toast-persistent-border-radius: 6px;
    }
    #eltoastcenter {
      --dile-toast-persistent-background-color: #1a6e3c;
      --dile-toast-persistent-border-radius: 6px;
    }
    #eltoastcenterright {
      --dile-toast-persistent-background-color: #7b3f00;
      --dile-toast-persistent-border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>dile-toast-persistent</h1>
    

    <dile-toast-persistent id="eltoast" >
      Toast left!!
      <br>
      <button id="close">Close</button>
    </dile-toast-persistent>
    <dile-toast-persistent id="eltoastright" right>
      hola right!!
      <br>
      <button id="closeright">Close</button>
    </dile-toast-persistent>
    <dile-toast-persistent id="eltoastcenter" center>
      Toast center!!
      <br>
      <button id="closecenter">Close</button>
    </dile-toast-persistent>
    <dile-toast-persistent id="eltoastcenterright" center right>
      center + right (right wins)
      <br>
      <button id="closecenterright">Close</button>
    </dile-toast-persistent>

    <button id="toastopen">Open left</button>
    <button id="toastclose">Close left</button>
    <button id="toastopenright">Open right</button>
    <button id="toastcloseright">Close right</button>
    <button id="toastopencenter">Open center</button>
    <button id="toastclosecenter">Close center</button>
    <button id="toastopencenterright">Open center+right</button>
    <button id="toastclosecenterright">Close center+right</button>
    
    <script>

      document.addEventListener("DOMContentLoaded", function() {
        let toast = document.getElementById("eltoast");
        let toastright = document.getElementById("eltoastright");
        let toastcenter = document.getElementById("eltoastcenter");
        let toastcenterright = document.getElementById("eltoastcenterright");

        document.getElementById("toastopen").addEventListener("click", () => toast.open());
        document.getElementById("toastclose").addEventListener("click", () => toast.close());
        document.getElementById("close").addEventListener("click", () => toast.close());

        document.getElementById("toastopenright").addEventListener("click", () => toastright.open());
        document.getElementById("toastcloseright").addEventListener("click", () => toastright.close());
        document.getElementById("closeright").addEventListener("click", () => toastright.close());

        document.getElementById("toastopencenter").addEventListener("click", () => toastcenter.open());
        document.getElementById("toastclosecenter").addEventListener("click", () => toastcenter.close());
        document.getElementById("closecenter").addEventListener("click", () => toastcenter.close());

        document.getElementById("toastopencenterright").addEventListener("click", () => toastcenterright.open());
        document.getElementById("toastclosecenterright").addEventListener("click", () => toastcenterright.close());
        document.getElementById("closecenterright").addEventListener("click", () => toastcenterright.close());
      });

    </script>

    <footer><a href="../index.html">Back</a></footer>
  </div>
</body>
</html>
