<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dile-many-relation component demo</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/style.css" />
        <script type="module" src="axios.js"></script>
        <script type="module">
            import { html } from "lit";
            import "@dile/crud/components/many-relation/many-relation.js";

            document.addEventListener("DOMContentLoaded", function () {
                const manyRelation =
                    document.querySelector("dile-many-relation");

                manyRelation.itemTemplate = (item) => html`
                    <span style="font-weight: bold;">${item.name}</span>
                `;
            });
        </script>
    </head>

    <body>
        <div class="container">
            <h1>dile-many-relation component</h1>

            <p>
                Demo de gestión de la relación muchos-a-muchos entre
                <strong>Board Games</strong> y <strong>Tags</strong>. Selecciona
                un tag del desplegable para añadirlo al juego, o usa el botón ×
                para eliminarlo.
            </p>

            <dile-many-relation
                endpointGet="https://timer.escuelait.com/api/tags"
                endpointList="https://timer.escuelait.com/api/board-games/1/tags"
                endpointAdd="https://timer.escuelait.com/api/board-games/1/tags"
                endpointRemove="https://timer.escuelait.com/api/board-games/1/tags"
                idProperty="id"
                bodyIdProperty="tag_id"
                displayProperty="name"
                queryStringVariable="search"
                resultDataProperty="data"
                loadFromEndpoint
                language="en"
                selectDefaultPlaceholder="Select Tag..."
            ></dile-many-relation>

            <footer><a href="./index.html">Back</a></footer>
        </div>
    </body>
</html>
